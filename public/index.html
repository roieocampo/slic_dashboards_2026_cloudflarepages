<!doctype html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ETS / LTX SLIC Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{--bg:#071326;--panel:#0d1f3b;--panel2:#10284d;--line:rgba(255,255,255,.12);--text:#eaf2ff;--muted:#94a9c7;--yellow:#ffd166;--orange:#ff8c42;--green:#34d399;--red:#fb7185;--blue:#60a5fa;--shadow:0 20px 60px rgba(0,0,0,.35)}
*{box-sizing:border-box}body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:radial-gradient(circle at 15% 10%,rgba(255,209,102,.16),transparent 28%),linear-gradient(135deg,#061126,#0b1b35 55%,#09142a);color:var(--text);min-height:100vh}button,input,select{font:inherit}a{color:inherit}.wrap{width:min(1800px,calc(100vw - 28px));margin:0 auto;padding:18px 0 34px}.topbar{position:sticky;top:0;z-index:50;background:rgba(7,19,38,.88);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}.nav{display:flex;align-items:center;justify-content:space-between;gap:12px;width:min(1800px,calc(100vw - 28px));margin:0 auto;padding:12px 0}.brand{display:flex;align-items:center;gap:12px}.logo{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,var(--yellow),var(--orange));box-shadow:0 12px 30px rgba(255,140,66,.25)}.brand h1{font-size:19px;margin:0}.brand small{display:block;color:var(--muted);font-weight:600}.nav-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.badge{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:rgba(255,255,255,.06);border-radius:999px;padding:8px 12px;color:#d9e8ff;font-weight:800}.tabs{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:18px 0}.tab{border:1px solid var(--line);background:rgba(255,255,255,.06);color:var(--text);border-radius:16px;padding:11px 18px;cursor:pointer;font-weight:900}.tab.active{background:linear-gradient(135deg,var(--yellow),var(--orange));color:#111827;border-color:transparent}.card{background:linear-gradient(180deg,rgba(16,40,77,.95),rgba(9,24,48,.95));border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);padding:16px;margin-bottom:14px}.card h2,.card h3{margin:0 0 12px}.muted{color:var(--muted)}.small{font-size:12px}.btn{border:1px solid var(--line);border-radius:14px;padding:10px 14px;background:rgba(255,255,255,.08);color:var(--text);cursor:pointer;font-weight:900;text-decoration:none;display:inline-flex;align-items:center;gap:8px;justify-content:center;min-height:42px}.btn:hover{filter:brightness(1.1)}.btn.primary{background:linear-gradient(135deg,var(--yellow),var(--orange));color:#111827;border:0}.btn.good{background:#0f7c52;border-color:#23b783}.btn.warn{background:#a55d00;border-color:#ffb020}.btn.danger{background:#9f1239;border-color:#fb7185}.iconbtn{width:44px;min-width:44px;padding:10px}.excel-svg{width:21px;height:21px}.hidden{display:none!important}.login-shell{min-height:100vh;display:grid;place-items:center;padding:20px}.login-card{width:min(450px,calc(100vw - 28px))}.form-grid{display:grid;gap:12px}.label,label{font-weight:800;color:#c7d7ef;margin-bottom:6px;display:block}input,select{width:100%;border:1px solid var(--line);background:#071a33;color:var(--text);border-radius:14px;padding:11px 12px;outline:none}input:focus,select:focus{border-color:var(--yellow);box-shadow:0 0 0 3px rgba(255,209,102,.14)}.flash{background:rgba(251,113,133,.13);border:1px solid rgba(251,113,133,.35);color:#fecdd3;border-radius:14px;padding:10px;margin:10px 0}.grid{display:grid;grid-template-columns:repeat(6,minmax(180px,1fr));gap:12px}.box{border:1px solid var(--line);background:rgba(255,255,255,.055);border-radius:18px;padding:12px}.box-title{font-size:12px;color:var(--muted);font-weight:900;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}.box-main{font-size:30px;font-weight:1000;color:#fff}.pill-row{display:flex;gap:8px;align-items:center;justify-content:space-between;border-top:1px solid rgba(255,255,255,.08);padding:7px 0}.pill-row:first-of-type{border-top:0}.pill-row b{font-size:18px}.pill-row.green b,.green-count{color:var(--green)!important}.pill-row.red b{color:var(--red)}.section-line{display:grid;grid-template-columns:repeat(4,minmax(260px,1fr));gap:12px}.weekbar{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}.weekbar select{max-width:280px}.week-count{min-width:120px;border:1px solid var(--line);border-radius:16px;padding:11px 14px;background:rgba(255,209,102,.13);font-size:20px;font-weight:1000;color:var(--yellow);text-align:center}.toolbar{display:flex;gap:10px;justify-content:space-between;align-items:center;flex-wrap:wrap}.searchline{display:flex;gap:8px;align-items:center;min-width:min(600px,100%);flex:1}.searchline input{max-width:520px}.righttools{display:flex;gap:8px;align-items:center;justify-content:flex-end;flex-wrap:wrap}.table-shell{position:relative}.table-wrap{overflow-x:auto;overflow-y:visible;border:1px solid var(--line);border-radius:18px;background:#071a33;min-height:120px}.table-wrap::-webkit-scrollbar,.float-scroll::-webkit-scrollbar{height:15px}.table-wrap::-webkit-scrollbar-thumb,.float-scroll::-webkit-scrollbar-thumb{background:#f59e0b;border-radius:999px}.float-scroll{position:fixed;left:16px;right:16px;bottom:10px;height:18px;overflow-x:auto;overflow-y:hidden;z-index:80;display:none;background:rgba(7,19,38,.84);border-radius:999px;border:1px solid var(--line)}.float-scroll.show{display:block}.float-inner{height:1px}.data-table{border-collapse:separate;border-spacing:0;min-width:1500px;width:max-content}.data-table th,.data-table td{border-bottom:1px solid rgba(255,255,255,.08);border-right:1px solid rgba(255,255,255,.06);padding:9px 10px;text-align:left;white-space:nowrap;vertical-align:top;max-width:360px;overflow:hidden;text-overflow:ellipsis}.data-table th{position:sticky;top:65px;background:#0c2344;color:#fff;z-index:10}.data-table thead tr.filters th{top:65px;background:#09203e;padding:6px}.data-table thead tr.headers th{top:110px}.filter-cell{display:flex;gap:5px;align-items:center}.filter-input{height:34px;padding:7px 8px;font-size:12px;min-width:130px}.filter-btn{height:34px;min-height:34px;width:32px;border-radius:10px;padding:0}.filter-menu{position:fixed;z-index:120;background:#091a33;border:1px solid var(--line);box-shadow:var(--shadow);border-radius:16px;padding:12px;width:280px;max-height:420px;display:none}.filter-menu.show{display:block}.filter-list{max-height:220px;overflow:auto;border:1px solid var(--line);border-radius:12px;padding:6px;margin:8px 0}.check{display:flex;gap:7px;align-items:center;padding:5px;border-radius:8px}.check:hover{background:rgba(255,255,255,.08)}.check input{width:auto}.admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.upload-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.loader{position:fixed;inset:0;background:rgba(3,10,22,.55);backdrop-filter:blur(4px);display:none;place-items:center;z-index:200}.loader.show{display:grid}.spinner{width:62px;height:62px;border-radius:50%;border:7px solid rgba(255,255,255,.16);border-top-color:var(--yellow);border-right-color:var(--orange);animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}@media(max-width:1100px){.grid,.section-line,.admin-grid,.upload-row{grid-template-columns:1fr}.searchline{min-width:100%}.nav{align-items:flex-start;flex-direction:column}.data-table th{top:112px}.data-table thead tr.headers th{top:157px}}
</style>
</head>
<body>
<div id="loader" class="loader"><div class="spinner"></div></div>
<div id="app"></div>
<div id="filterMenu" class="filter-menu"></div>
<script>
const APP={me:null,sheet:'LTX',rows:[],headers:[],meta:{},lastSync:{},summary:null,filters:{},filterSearches:{},keyword:'',week:'',settings:null};
const SYNC_CFG={LTX:{sheetName:'3Q26_LTX Updated_MONITORING',headerRow:2,dataStartRow:3,columns:[1,2,5,7,13,14,15,16,18,19]},ETS:{sheetName:'3Q26_ETS Updated_MONITORING',headerRow:2,dataStartRow:3,columns:[1,2,5,7,13,14,15,16,18,19]}};
function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function showLoad(){document.getElementById('loader').classList.add('show')}function hideLoad(){document.getElementById('loader').classList.remove('show')}
async function api(url,opts={}){const res=await fetch(url,{...opts,headers:{'content-type':'application/json',...(opts.headers||{})}});const data=await res.json().catch(()=>({}));if(!res.ok||data.ok===false)throw new Error(data.error||('Request failed '+res.status));return data;}
function normText(v){return String(v??'').replace(/\s+/g,' ').trim()}function searchNorm(v){return String(v??'').toLowerCase().replace(/[^a-z0-9]+/g,'')}function variants(v){const b=searchNorm(v),s=new Set(b?[b]:[]);if(b.startsWith('ltc'))s.add('lt'+b.slice(3));else if(b.startsWith('lt'))s.add('ltc'+b.slice(2));return [...s].filter(Boolean)}function smartMatch(value,kw){kw=normText(kw);if(!kw)return true;const t=String(value??'');if(t.toLowerCase().includes(kw.toLowerCase()))return true;const h=searchNorm(t);return variants(kw).some(v=>v&&h.includes(v))}
function rowCell(r,i){const vals=r.row_values||[];return i>=0&&i<vals.length?normText(vals[i]):''}function rowText(r){return (r.row_values||[]).join(' | ')}
function formatSync(v){if(!v)return 'No sync yet';const d=new Date(v);if(isNaN(d))return String(v);return d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',second:'2-digit',hour12:true})+' | '+d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});} 
function loginView(err=''){document.body.innerHTML='<div id="loader" class="loader"><div class="spinner"></div></div><div class="login-shell"><div class="card login-card"><div class="brand" style="margin-bottom:18px"><div class="logo"></div><div><h1>ETS / LTX SLIC Dashboard</h1></div></div>'+(err?'<div class="flash">'+esc(err)+'</div>':'')+'<form id="loginForm" class="form-grid"><div><label>Username</label><input name="username" required autofocus></div><div><label>Password</label><input name="password" type="password" required></div><button class="btn primary" type="submit">Login</button></form></div></div>';document.getElementById('loginForm').onsubmit=async e=>{e.preventDefault();showLoad();try{const fd=new FormData(e.target);await api('/api/login',{method:'POST',body:JSON.stringify({username:fd.get('username'),password:fd.get('password')})});location.href='/dashboard'}catch(x){loginView(x.message)}finally{hideLoad()}}}
async function init(){try{const me=await api('/api/me');if(!me.logged_in){loginView();return}APP.me=me;renderShell();await loadSheet('LTX');}catch(e){loginView(e.message)}}
function renderShell(){document.body.innerHTML='<div id="loader" class="loader"><div class="spinner"></div></div><div class="topbar"><div class="nav"><div class="brand"><div class="logo"></div><div><h1>ETS / LTX SLIC Dashboard</h1><small id="syncSmall">Loading...</small></div></div><div class="nav-actions"><span class="badge">'+esc(APP.me.label)+'</span><button class="btn" id="logoutBtn">Logout</button></div></div></div><div class="wrap"><div class="tabs"><button class="tab active" data-tab="LTX">LTX</button><button class="tab" data-tab="ETS">ETS</button></div><div id="content"></div></div>';document.getElementById('logoutBtn').onclick=async()=>{await api('/api/logout',{method:'POST',body:'{}'});location.href='/login'};document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>loadSheet(b.dataset.tab));}
async function loadSheet(sheet){APP.sheet=sheet;APP.filters={};APP.filterSearches={};APP.keyword='';APP.week='';showLoad();try{document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===sheet));const d=await api('/api/data?sheet='+sheet);APP.rows=d.rows||[];APP.headers=d.meta.headers||[];APP.meta=d.meta||{};APP.lastSync=d.last_sync||{};APP.summary=d.summary||{};APP.canView=d.can_view_rows;APP.canAdmin=d.can_admin;document.getElementById('syncSmall').textContent='Last sync: '+formatSync(APP.lastSync.finished_at);renderDashboard();}catch(e){document.getElementById('content').innerHTML='<div class="card flash">'+esc(e.message)+'</div>'}finally{hideLoad()}}
function countRows(counts){return Object.entries(counts||{}).sort((a,b)=>b[1]-a[1]||a[0].localeCompare(b[0])).map(([k,v])=>'<div class="pill-row '+(['SLIC Converted','SUV Converted','SUV+HW Checker','Completed'].includes(k)?'green':'')+'"><span>'+esc(k)+'</span><b>'+Number(v||0).toLocaleString()+'</b></div>').join('')||'<span class="muted">No data</span>'}
function summaryBoxes(){const s=APP.summary||{};return '<div class="grid"><div class="box"><div class="box-title">Partnames Counts</div><div class="box-main">'+Number(s.partnames_count||0).toLocaleString()+'</div></div><div class="box"><div class="box-title">PE Updates</div>'+countRows(s.pe_counts)+'</div><div class="box"><div class="box-title">Enrollment Status</div>'+countRows(s.enrollment_counts)+'</div><div class="box"><div class="box-title">Cloud Enrollment Remarks</div>'+countRows(s.remarks_counts)+'</div><div class="box"><div class="box-title">TRS Updates</div>'+countRows(s.trs_counts)+'</div><div class="box"><div class="box-title">Final Remarks / Status</div>'+countRows(s.final_counts)+'</div></div>'}
function weekBox(){const idx=APP.summary?.indexes?.weekIdx;const counts=APP.summary?.week_counts||{};if(idx==null||idx<0)return '';const opts=['<option value="">All Week Completion</option>',...Object.entries(counts).sort((a,b)=>b[1]-a[1]||a[0].localeCompare(b[0])).map(([k])=>'<option '+(APP.week===k?'selected':'')+' value="'+esc(k)+'">'+esc(k)+'</option>')].join('');const c=APP.week?counts[APP.week]||0:Object.values(counts).reduce((a,b)=>a+Number(b||0),0);return '<div class="card"><div class="weekbar"><div><label>Week Completion</label><select id="weekSel">'+opts+'</select></div><div><label>Count</label><div class="week-count">'+Number(c).toLocaleString()+'</div></div></div></div>'}
function filteredRows(){let rows=[...APP.rows];if(APP.week){const idx=APP.summary?.indexes?.weekIdx;rows=rows.filter(r=>rowCell(r,idx)===APP.week)}if(APP.keyword)rows=rows.filter(r=>smartMatch(rowText(r),APP.keyword));Object.entries(APP.filterSearches).forEach(([i,q])=>{if(q)rows=rows.filter(r=>smartMatch(rowCell(r,Number(i)),q))});Object.entries(APP.filters).forEach(([i,vals])=>{if(vals&&vals.length)rows=rows.filter(r=>vals.some(v=>smartMatch(rowCell(r,Number(i)),v)||rowCell(r,Number(i))===v))});return rows}
function renderDashboard(){let html='<div class="card"><div class="toolbar"><div><h2 style="margin:0">'+APP.sheet+' Dashboard</h2><div class="muted">Rows stored: '+Number(APP.meta.row_count||0).toLocaleString()+'</div></div>'+(APP.canView?'<div class="righttools"><button class="btn good iconbtn" title="Export current filtered table" onclick="exportXlsx(false)">'+excelIcon()+'</button><button class="btn warn iconbtn" title="Export all rows in this tab" onclick="exportXlsx(true)">'+excelIconAll()+'</button></div>':'')+'</div></div>'+summaryBoxes()+weekBox();if(APP.canAdmin)html+=adminPanel();if(APP.canView)html+=tablePanel();else html+='<div class="card"><h3>User Access</h3><p class="muted">Summary and counts only.</p></div>';document.getElementById('content').innerHTML=html;bindDashboard();}
function excelIcon(){return '<svg class="excel-svg" viewBox="0 0 24 24"><path d="M5 3h10l4 4v14H5V3zm9 1.5V8h3.5L14 4.5zM8 10l2.2 3L8 16h2.2l1.1-1.6 1.1 1.6h2.2l-2.2-3 2.2-3h-2.2l-1.1 1.6L10.2 10H8z" fill="currentColor"/></svg>'}function excelIconAll(){return '<span style="position:relative">'+excelIcon()+'<b style="font-size:9px;position:absolute;right:-8px;bottom:-5px;color:#fff;background:#0f172a;border-radius:8px;padding:1px 3px">ALL</b></span>'}
function adminPanel(){return '<div class="card"><h3>Admin Access</h3><div class="admin-grid"><div><h3>Upload Excel & Sync</h3><div class="upload-row"><div><label>LTX Excel file</label><input type="file" id="ltxFile" accept=".xlsx,.xlsm"></div><div><label>ETS Excel file</label><input type="file" id="etsFile" accept=".xlsx,.xlsm"></div></div><button id="syncBtn" class="btn primary" style="margin-top:12px">Upload Excel & Sync</button><div id="syncStatus" class="muted small" style="margin-top:8px"></div></div><div><h3>Local Auto Sync Settings</h3><div class="upload-row"><label><input type="checkbox" id="setEnabled" style="width:auto"> Enable Auto Sync</label><div><label>Schedule Type</label><select id="setType"><option value="interval">Every X minutes</option><option value="daily">Specific time daily</option></select></div><div><label>Every X minutes</label><input id="setInterval" type="number" min="1" value="5"></div><div><label>Daily Time</label><input id="setDaily" type="time" value="00:00"></div></div><div style="margin-top:10px"><label>LTX Path</label><input id="setLtx"></div><div style="margin-top:10px"><label>ETS Path</label><input id="setEts"></div><button id="saveSettings" class="btn good" style="margin-top:12px">Save Auto Sync Settings</button></div></div></div>'}
function tablePanel(){return '<div class="card"><div class="toolbar"><div class="searchline"><input id="globalSearch" placeholder="Search all table data..." value="'+esc(APP.keyword)+'"><button class="btn primary" id="searchBtn">Search</button><button class="btn" id="clearBtn">Clear</button></div><div class="muted">Showing <b id="showCount">0</b> matching rows</div></div></div><div class="card table-shell"><div id="tableWrap" class="table-wrap"></div><div id="floatScroll" class="float-scroll"><div class="float-inner"></div></div></div>'}
function bindDashboard(){const w=document.getElementById('weekSel');if(w)w.onchange=e=>{APP.week=e.target.value;renderDashboard()};const gs=document.getElementById('globalSearch');if(gs)gs.onkeydown=e=>{if(e.key==='Enter'){APP.keyword=gs.value;renderDashboard()}};const sb=document.getElementById('searchBtn');if(sb)sb.onclick=()=>{APP.keyword=document.getElementById('globalSearch').value;renderDashboard()};const cb=document.getElementById('clearBtn');if(cb)cb.onclick=()=>{APP.keyword='';APP.filters={};APP.filterSearches={};APP.week='';renderDashboard()};if(APP.canView)renderTable();if(APP.canAdmin){loadSettings();document.getElementById('saveSettings').onclick=saveSettings;document.getElementById('syncBtn').onclick=browserSync;}}
function renderTable(){const rows=filteredRows();document.getElementById('showCount').textContent=rows.length.toLocaleString();const headers=APP.headers.length?APP.headers:Array.from({length:10},(_,i)=>'Column '+String.fromCharCode(65+i));let h1='<tr class="filters">',h2='<tr class="headers">';headers.forEach((h,i)=>{h1+='<th><div class="filter-cell"><input class="filter-input" placeholder="Filter..." value="'+esc(APP.filterSearches[i]||'')+'" onkeydown="if(event.key===\'Enter\'){APP.filterSearches['+i+']=this.value;renderDashboard()}"><button class="btn filter-btn" title="Select filter values" onclick="openFilter(event,'+i+')">▼</button></div></th>';h2+='<th>'+esc(h)+'</th>'});h1+='</tr>';h2+='</tr>';let body=rows.map(r=>'<tr>'+headers.map((_,i)=>'<td title="'+esc(rowCell(r,i))+'">'+esc(rowCell(r,i))+'</td>').join('')+'</tr>').join('')||'<tr><td colspan="'+headers.length+'" class="muted">No matching rows found.</td></tr>';document.getElementById('tableWrap').innerHTML='<table class="data-table"><thead>'+h1+h2+'</thead><tbody>'+body+'</tbody></table>';setupFloatingScroll();}
function openFilter(ev,idx){ev.stopPropagation();const menu=document.getElementById('filterMenu');const values=[...new Set(APP.rows.map(r=>rowCell(r,idx)).filter(Boolean))].sort((a,b)=>a.localeCompare(b));const selected=new Set(APP.filters[idx]||[]);menu.innerHTML='<b>'+esc(APP.headers[idx]||'Filter')+'</b><input id="filterValueSearch" placeholder="Search values..." style="margin-top:8px"><div class="filter-list" id="filterList"></div><div style="display:flex;gap:8px;justify-content:flex-end"><button class="btn" id="fClear">Clear</button><button class="btn primary" id="fApply">Apply</button></div>';function fill(q=''){const list=document.getElementById('filterList');list.innerHTML=values.filter(v=>smartMatch(v,q)).slice(0,500).map(v=>'<label class="check"><input type="checkbox" value="'+esc(v)+'" '+(selected.has(v)?'checked':'')+'> <span>'+esc(v)+'</span></label>').join('')||'<div class="muted small">No values</div>'}fill();document.getElementById('filterValueSearch').oninput=e=>fill(e.target.value);document.getElementById('fApply').onclick=()=>{APP.filters[idx]=[...menu.querySelectorAll('.filter-list input:checked')].map(x=>x.value);menu.classList.remove('show');renderDashboard()};document.getElementById('fClear').onclick=()=>{delete APP.filters[idx];menu.classList.remove('show');renderDashboard()};const r=ev.target.getBoundingClientRect();menu.style.left=Math.min(r.left,window.innerWidth-300)+'px';menu.style.top=(r.bottom+6)+'px';menu.classList.add('show');}
document.addEventListener('click',e=>{const m=document.getElementById('filterMenu');if(m&&!m.contains(e.target))m.classList.remove('show')});
async function loadSettings(){try{const d=await api('/api/settings');const s=d.settings||{};APP.settings=s;document.getElementById('setEnabled').checked=!!s.enabled;document.getElementById('setType').value=s.schedule_type||'interval';document.getElementById('setInterval').value=s.interval_minutes||5;document.getElementById('setDaily').value=s.daily_time||'00:00';document.getElementById('setLtx').value=s.ltx_path||'';document.getElementById('setEts').value=s.ets_path||''}catch(e){console.warn(e)}}
async function saveSettings(){showLoad();try{await api('/api/settings',{method:'POST',body:JSON.stringify({enabled:document.getElementById('setEnabled').checked,schedule_type:document.getElementById('setType').value,interval_minutes:document.getElementById('setInterval').value,daily_time:document.getElementById('setDaily').value,ltx_path:document.getElementById('setLtx').value,ets_path:document.getElementById('setEts').value})});alert('Auto sync settings saved. The local_sync_agent.py must be running on your PC.')}catch(e){alert(e.message)}finally{hideLoad()}}
function slicCell(v){if(v==null)return '';if(v instanceof Date)return v.toISOString().slice(0,19).replace('T',' ');return String(v).trim()}function displayHeader(col,raw){const f={1:'Partname',13:'Enrollment Status',14:'Cloud Enrollment Remarks',15:'TRS Updates',16:'PE Updates',18:'Final Remarks / Status',19:'Week Completion'};return f[col]||normText(raw)||('Column '+String.fromCharCode(64+col))}function uniqueHeaders(h){const seen={};return h.map((x,i)=>{let b=x||('Column '+String.fromCharCode(65+i));if(seen[b]){seen[b]++;return b+' ('+seen[b]+')'}seen[b]=1;return b})}
async function parseExcel(sheetKey,file){if(!window.XLSX)throw new Error('Excel parser CDN is blocked.');const cfg=SYNC_CFG[sheetKey];const buf=await file.arrayBuffer();const wb=XLSX.read(buf,{type:'array',cellDates:true});if(!wb.SheetNames.includes(cfg.sheetName))throw new Error('Sheet not found for '+sheetKey+': '+cfg.sheetName);const aoa=XLSX.utils.sheet_to_json(wb.Sheets[cfg.sheetName],{header:1,raw:false,defval:'',blankrows:false});const headers=uniqueHeaders(cfg.columns.map(c=>displayHeader(c,slicCell((aoa[cfg.headerRow-1]||[])[c-1]))));const rows=[];for(let r=cfg.dataStartRow-1;r<aoa.length;r++){const vals=cfg.columns.map(c=>slicCell((aoa[r]||[])[c-1]));if(vals.every(x=>!normText(x)))continue;rows.push({source_row:r+1,row_values:vals})}return {sheet_key:sheetKey,sheet_name:cfg.sheetName,headers,rows,row_count:rows.length}}
async function browserSync(){const ltx=document.getElementById('ltxFile').files[0],ets=document.getElementById('etsFile').files[0];const jobs=[];if(ltx)jobs.push(['LTX',ltx]);if(ets)jobs.push(['ETS',ets]);if(!jobs.length){alert('Choose at least one LTX or ETS Excel file.');return}if(!confirm('Upload selected Excel file(s) and sync now?'))return;showLoad();const st=document.getElementById('syncStatus');try{const start=await api('/api/sync/start',{method:'POST',body:'{}'});const syncId=start.sync_id;const metas=[];for(const [sheetKey,file] of jobs){st.textContent='Reading '+sheetKey+' Excel...';const parsed=await parseExcel(sheetKey,file);metas.push({sheet_key:sheetKey,sheet_name:parsed.sheet_name,headers:parsed.headers,row_count:parsed.row_count});for(let i=0;i<parsed.rows.length;i+=250){st.textContent='Syncing '+sheetKey+' rows '+(i+1)+'-'+Math.min(i+250,parsed.rows.length)+' of '+parsed.rows.length.toLocaleString();await api('/api/sync/chunk',{method:'POST',body:JSON.stringify({sync_id:syncId,sheet_key:sheetKey,sheet_name:parsed.sheet_name,headers:parsed.headers,rows:parsed.rows.slice(i,i+250)})});}}st.textContent='Finalizing sync...';await api('/api/sync/finish',{method:'POST',body:JSON.stringify({sync_id:syncId,sheets:metas,started_at:start.started_at})});st.textContent='Sync completed.';await loadSheet(APP.sheet)}catch(e){alert(e.message);st.textContent='Sync failed: '+e.message}finally{hideLoad()}}
function exportXlsx(all){const rows=all?APP.rows:filteredRows();const headers=APP.headers.length?APP.headers:Array.from({length:10},(_,i)=>'Column '+String.fromCharCode(65+i));const aoa=[headers,...rows.map(r=>headers.map((_,i)=>rowCell(r,i)))];if(window.XLSX){const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(aoa),APP.sheet);XLSX.writeFile(wb,APP.sheet+(all?'_ALL':'_FILTERED')+'_export.xlsx')}else{const csv=aoa.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=APP.sheet+'_export.csv';a.click();}}
function setupFloatingScroll(){const wrap=document.getElementById('tableWrap'),fl=document.getElementById('floatScroll');if(!wrap||!fl)return;const table=wrap.querySelector('table');if(!table)return;fl.querySelector('.float-inner').style.width=table.scrollWidth+'px';function sync(){const rect=wrap.getBoundingClientRect();fl.scrollLeft=wrap.scrollLeft;fl.querySelector('.float-inner').style.width=table.scrollWidth+'px';const needs=table.scrollWidth>wrap.clientWidth+8;const tableVisible=rect.top<innerHeight-70&&rect.bottom>innerHeight-28;const atBottom=rect.bottom<=innerHeight-28;fl.classList.toggle('show',needs&&tableVisible&&!atBottom)}wrap.onscroll=()=>{fl.scrollLeft=wrap.scrollLeft;sync()};fl.onscroll=()=>{wrap.scrollLeft=fl.scrollLeft};window.onscroll=sync;window.onresize=sync;setTimeout(sync,100);setTimeout(sync,700)}
init();
