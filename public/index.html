<style>
:root{--bg:#061426;--panel:#0b1e35;--panel2:#102845;--card:#0d2746;--line:#1f4168;--text:#eaf4ff;--muted:#9fb7d4;--yellow:#ffd166;--orange:#f97316;--orange2:#ff9f1c;--blue:#3b82f6;--green:#22c55e;--red:#ef4444;--soft:#0a223d;}
*{box-sizing:border-box} body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:radial-gradient(circle at top left,#173a62 0,#061426 42%,#030914 100%);color:var(--text);min-height:100vh}.loading-overlay{position:fixed;inset:0;z-index:9999;background:rgba(3,9,20,.72);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;transition:opacity .18s ease}.loading-overlay.hidden{opacity:0;pointer-events:none}.dot-loader{position:relative;width:74px;height:74px;border-radius:50%;animation:loaderRotate .95s linear infinite}.dot-loader span{position:absolute;left:32px;top:2px;width:10px;height:10px;border-radius:50%;background:linear-gradient(135deg,var(--yellow),var(--orange));box-shadow:0 0 18px rgba(255,209,102,.8);transform-origin:5px 35px;animation:spinDots 1s linear infinite}.dot-loader span:nth-child(2){transform:rotate(45deg);animation-delay:-.875s}.dot-loader span:nth-child(3){transform:rotate(90deg);animation-delay:-.75s}.dot-loader span:nth-child(4){transform:rotate(135deg);animation-delay:-.625s}.dot-loader span:nth-child(5){transform:rotate(180deg);animation-delay:-.5s}.dot-loader span:nth-child(6){transform:rotate(225deg);animation-delay:-.375s}.dot-loader span:nth-child(7){transform:rotate(270deg);animation-delay:-.25s}.dot-loader span:nth-child(8){transform:rotate(315deg);animation-delay:-.125s}@keyframes loaderRotate{to{transform:rotate(360deg)}}@keyframes spinDots{0%{opacity:1}100%{opacity:.25}}.wrap{width:98.5vw;max-width:1920px;margin:0 auto;padding:18px}.nav{display:flex;align-items:center;justify-content:space-between;gap:18px;margin-bottom:12px}.brand{display:flex;gap:12px;align-items:center}.logo{width:46px;height:46px;border-radius:15px;background:linear-gradient(135deg,var(--yellow),var(--orange));display:grid;place-items:center;color:#061426;font-weight:900;box-shadow:0 12px 35px rgba(249,115,22,.35)}h1{margin:0;font-size:25px}.sub{color:var(--muted);font-size:13px;margin-top:3px}.navlinks{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.btn{border:0;border-radius:13px;padding:10px 14px;background:#173a62;color:var(--text);font-weight:800;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;box-shadow:0 8px 22px rgba(0,0,0,.2);white-space:nowrap}.btn:hover{filter:brightness(1.12);transform:translateY(-1px)}.btn.primary{background:linear-gradient(135deg,var(--orange),var(--orange2));color:#111827}.btn.yellow{background:linear-gradient(135deg,var(--yellow),#ffe08a);color:#111827}.btn.ghost{background:transparent;border:1px solid var(--line)}.btn.danger{background:#7f1d1d}.btn.excel-btn{width:48px;height:44px;padding:0;background:linear-gradient(135deg,#16a34a,#22c55e);color:#052e16}.excel-svg{width:22px;height:22px;display:block}.excel-all-wrap{display:flex;align-items:center;gap:4px}.excel-all-wrap b{font-size:10px;letter-spacing:.03em}.card{background:linear-gradient(180deg,rgba(16,40,69,.95),rgba(8,25,46,.96));border:1px solid var(--line);border-radius:20px;padding:16px;box-shadow:0 18px 45px rgba(0,0,0,.28);margin-bottom:14px}.topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}.tabs{display:flex;gap:10px;flex-wrap:wrap}.tab{padding:12px 20px;border-radius:14px;background:#102844;border:1px solid var(--line);color:var(--text);text-decoration:none;font-weight:900;min-width:105px;text-align:center}.tab.active{background:linear-gradient(135deg,var(--yellow),var(--orange));color:#0b1324;border-color:transparent}.accent-line{height:4px;border-radius:999px;background:linear-gradient(90deg,var(--yellow),var(--orange),#2563eb);margin:12px 0}.muted{color:var(--muted)}.small{font-size:12px}.badge{display:inline-flex;padding:5px 9px;border-radius:999px;background:#173a62;color:#c9e6ff;font-weight:900;font-size:12px}.flash{padding:12px 14px;border-radius:14px;margin-bottom:12px;background:#7f1d1d;color:white}.flash.ok{background:#14532d}.login-card{max-width:440px;margin:8vh auto}.form-grid{display:grid;grid-template-columns:1fr;gap:12px}input,select{width:100%;padding:11px 12px;border-radius:13px;border:1px solid #28517c;background:#061a30;color:var(--text);outline:none}label{font-weight:800;font-size:12px;margin-bottom:6px;display:block}.section-title{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:10px}.section-title h3{margin:0}.week-row{display:flex;gap:12px;align-items:end;flex-wrap:wrap}.week-row form{display:flex;gap:10px;align-items:end;flex-wrap:wrap}.week-select-wrap{min-width:270px}.week-count-box{height:43px;min-width:82px;border-radius:14px;background:linear-gradient(135deg,var(--yellow),var(--orange));color:#08182c;font-weight:950;font-size:18px;display:grid;place-items:center;padding:0 15px;box-shadow:0 10px 24px rgba(249,115,22,.25)}.summary-line{display:flex;gap:12px;overflow-x:auto;padding-bottom:4px;scrollbar-color:#28517c transparent}.summary-box{min-width:220px;flex:1 0 220px;padding:14px;border-radius:18px;background:linear-gradient(180deg,#102d4f,#0b2039);border:1px solid #20466f}.summary-box.main{min-width:190px;max-width:250px}.summary-box h4{margin:0 0 10px;color:#fff;font-size:14px}.big-number{font-size:36px;font-weight:950;color:var(--yellow);line-height:1}.summary-row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:6px 0;border-top:1px solid rgba(148,163,184,.15)}.summary-row:first-of-type{border-top:0}.summary-row span{color:#c9d9ea;font-size:12px;overflow:hidden;text-overflow:ellipsis}.summary-row strong{font-size:17px;color:var(--yellow);white-space:nowrap}.summary-row.green strong{color:var(--green)}.summary-row.red strong{color:#ff7b7b}.summary-row.orange strong{color:var(--orange2)}.toolbar{display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap;margin-bottom:12px}.table-card{padding:12px}.table-actions{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}.filter-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.table-wrap{height:78vh;overflow:scroll;scrollbar-gutter:stable both-edges;border:1px solid var(--line);border-radius:16px;background:#07182c} .floating-x-scroll{position:fixed;left:50%;transform:translateX(-50%);bottom:10px;width:min(96vw,1500px);height:18px;overflow-x:auto;overflow-y:hidden;background:rgba(7,24,44,.96);border:1px solid #315b88;border-radius:999px;z-index:900;box-shadow:0 12px 28px rgba(0,0,0,.4);display:none}.floating-x-scroll.show{display:block}.floating-x-scroll-inner{height:1px}table{width:100%;min-width:1800px;border-collapse:separate;border-spacing:0;table-layout:auto}th,td{padding:8px 10px;border-bottom:1px solid rgba(148,163,184,.2);text-align:left;vertical-align:top;font-size:12px;white-space:nowrap;max-width:300px;overflow:hidden;text-overflow:ellipsis}.keyword-input{width:360px;max-width:55vw;height:38px;padding:8px 11px}td:hover{white-space:normal;overflow:visible}th{position:sticky;background:#0f2a49;color:var(--yellow);z-index:3}.filter-head th{top:0;background:#0a213b;padding:7px;z-index:6;overflow:visible}.label-head th{top:49px;background:#102c4e;z-index:5}.filter-cell{position:relative;display:flex;align-items:center;justify-content:center}.filter-trigger{width:100%;min-width:92px;height:34px;border:1px solid #28517c;background:#061a30;color:#eaf4ff;border-radius:10px;font-size:12px;font-weight:850;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:6px;padding:0 8px}.filter-trigger.active{border-color:var(--orange);box-shadow:0 0 0 2px rgba(249,115,22,.2)}.filter-menu{display:none;position:fixed;left:0;top:0;text-align:left;width:260px;max-width:78vw;background:#071d35;border:1px solid #2c5683;border-radius:14px;box-shadow:0 22px 45px rgba(0,0,0,.45);padding:10px;z-index:30;color:var(--text)}.filter-menu.open{display:block}.filter-menu input[type="text"]{height:36px;margin-bottom:8px;padding:8px}.choice-list{max-height:230px;overflow:auto;border:1px solid rgba(148,163,184,.18);border-radius:10px;padding:6px;background:#061a30}.choice-row{display:flex;align-items:center;gap:7px;padding:5px 3px;font-size:12px;color:#dbeafe;cursor:pointer}.choice-row input{width:auto}.choice-row small{color:var(--muted);margin-left:auto}.filter-menu .menu-actions{display:flex;gap:7px;margin-top:9px}.empty{padding:26px;text-align:center;color:var(--muted)}.upload-panel{max-width:520px}.upload-panel input[type=file]{max-width:360px}@media(max-width:1100px){.nav{align-items:flex-start;flex-direction:column}.wrap{width:100%;padding:14px}.label-head th{top:49px}.summary-line{overflow-x:auto}.table-wrap{height:72vh}}@media(max-width:680px){.topbar{align-items:flex-start}.table-wrap{height:65vh}th,td{font-size:11px;padding:7px}.filter-menu{width:240px}.tabs{width:100%}.tab{flex:1}.summary-box{min-width:210px}}
'''
.nav button.btn.ghost{border:1px solid var(--line);} .login-card h2{margin-top:0}.cf-hidden{display:none!important}.navlinks button{appearance:none}.admin-grid{display:grid;grid-template-columns:1fr;gap:12px}.upload-row{display:flex;gap:12px;flex-wrap:wrap;align-items:end}.upload-row>div{min-width:260px;flex:1}.excel-btn.warn{background:linear-gradient(135deg,#f97316,#ff9f1c);color:#111827}.float-scroll{display:none}.data-table{min-width:1800px}.filter-list{max-height:230px;overflow:auto;border:1px solid rgba(148,163,184,.18);border-radius:10px;padding:6px;background:#061a30}.check{display:flex;gap:7px;align-items:center;padding:5px 3px;font-size:12px;color:#dbeafe;cursor:pointer}.check input{width:auto}.filter-btn{height:34px;min-height:34px;width:32px;border-radius:10px;padding:0}.filter-input{height:34px;padding:7px 8px;font-size:12px;min-width:130px}.righttools{display:flex;gap:8px;align-items:center;justify-content:flex-end;flex-wrap:wrap}.table-shell{position:relative}.float-scroll.show{display:block}

<body>
<div id="pageLoader" class="loading-overlay"><div class="dot-loader"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div></div>
<div id="app"></div>
<div id="filterMenu" class="filter-menu"></div>
<script>
const APP={me:null,sheet:'LTX',rows:[],headers:[],meta:{},lastSync:{},summary:null,filters:{},filterSearches:{},keyword:'',weeks:[],settings:null};
const SYNC_CFG={LTX:{sheetName:'3Q26_LTX Updated_MONITORING',headerRow:2,dataStartRow:3,columns:[1,2,5,7,13,14,15,16,18,19]},ETS:{sheetName:'3Q26_ETS Updated_MONITORING',headerRow:2,dataStartRow:3,columns:[1,2,5,7,13,14,15,16,18,19]}};
function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function showLoad(){var l=document.getElementById('pageLoader');if(l)l.classList.remove('hidden')}function hideLoad(){var l=document.getElementById('pageLoader');if(l)l.classList.add('hidden')}
async function api(url,opts={}){const res=await fetch(url,{...opts,headers:{'content-type':'application/json',...(opts.headers||{})}});const data=await res.json().catch(()=>({}));if(!res.ok||data.ok===false)throw new Error(data.error||('Request failed '+res.status));return data;}
function normText(v){return String(v??'').replace(/\s+/g,' ').trim()}function searchNorm(v){return String(v??'').toLowerCase().replace(/[^a-z0-9]+/g,'')}function variants(v){const b=searchNorm(v),s=new Set(b?[b]:[]);if(b.startsWith('ltc'))s.add('lt'+b.slice(3));else if(b.startsWith('lt'))s.add('ltc'+b.slice(2));return [...s].filter(Boolean)}function smartMatch(value,kw){kw=normText(kw);if(!kw)return true;const t=String(value??'');if(t.toLowerCase().includes(kw.toLowerCase()))return true;const h=searchNorm(t);return variants(kw).some(v=>v&&h.includes(v))}
function rowCell(r,i){const vals=r.row_values||[];return i>=0&&i<vals.length?normText(vals[i]):''}function rowText(r){return (r.row_values||[]).join(' | ')}
function formatSync(v){if(!v)return 'No sync yet';const d=new Date(v);if(isNaN(d))return String(v);return d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',second:'2-digit',hour12:true})+' | '+d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});} 
function loginView(err=''){
  document.body.innerHTML='<div id="pageLoader" class="loading-overlay hidden"><div class="dot-loader"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div></div><div class="wrap"><div class="nav"><div class="brand"><div class="logo">SD</div><div><h1>SLIC DashBoards</h1><div class="sub">ETS / LTX SLIC Dashboard</div></div></div><div class="navlinks"></div></div><div class="login-card card"><h2>Login</h2>'+(err?'<div class="flash">'+esc(err)+'</div>':'')+'<form id="loginForm" class="form-grid"><div><label>Username</label><input name="username" autocomplete="username" required autofocus></div><div><label>Password</label><input name="password" type="password" autocomplete="current-password" required></div><button class="btn primary" type="submit">Login</button></form><div class="accent-line"></div></div></div>';
  document.getElementById('loginForm').onsubmit=async e=>{e.preventDefault();showLoad();try{const fd=new FormData(e.target);await api('/api/login',{method:'POST',body:JSON.stringify({username:fd.get('username'),password:fd.get('password')})});location.href='/dashboard'}catch(x){loginView(x.message)}finally{hideLoad()}}
}
async function init(){try{const me=await api('/api/me');if(!me.logged_in){loginView();return}APP.me=me;renderShell();await loadSheet('LTX');}catch(e){loginView(e.message)}}
function renderShell(){
  document.body.innerHTML='<div id="pageLoader" class="loading-overlay hidden"><div class="dot-loader"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div></div><div class="wrap"><div class="nav"><div class="brand"><div class="logo">SD</div><div><h1>SLIC DashBoards</h1><div class="sub">ETS / LTX SLIC Dashboard</div></div></div><div class="navlinks"><span class="badge">'+esc(APP.me.label)+'</span><button class="btn ghost" id="logoutBtn">Logout</button></div></div><div id="content"></div></div><div id="filterMenu" class="filter-menu"></div>';
  document.getElementById('logoutBtn').onclick=async()=>{showLoad();await api('/api/logout',{method:'POST',body:'{}'});location.href='/login'};
}
async function loadSheet(sheet){APP.sheet=sheet;APP.filters={};APP.filterSearches={};APP.keyword='';APP.weeks=[];showLoad();try{document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===sheet));const d=await api('/api/data?sheet='+sheet);APP.rows=d.rows||[];APP.headers=d.meta.headers||[];APP.meta=d.meta||{};APP.lastSync=d.last_sync||{};APP.summary=d.summary||{};APP.canView=d.can_view_rows;APP.canAdmin=d.can_admin;const syncSmall=document.getElementById('syncSmall');if(syncSmall)syncSmall.textContent='Last sync: '+formatSync(APP.lastSync.finished_at);renderDashboard();}catch(e){document.getElementById('content').innerHTML='<div class="card flash">'+esc(e.message)+'</div>'}finally{hideLoad()}}
function rowColorClass(label){const k=normText(label).toLowerCase();const green=['completed','done','already approved in local','slic converted','suv converted','suv+hw checker','suv hw checker'];if(green.includes(k))return 'green';if(['failed','no suv yet'].includes(k))return 'red';if(['ongoing','for approval','for trs','for approval in local'].includes(k))return 'orange';return ''}
function summaryRowsHtml(counts){const entries=Object.entries(counts||{});if(!entries.length)return '<div class="summary-row"><span>No data</span><strong>0</strong></div>';return entries.map(([k,v])=>'<div class="summary-row '+rowColorClass(k)+'"><span title="'+esc(k)+'">'+esc(k)+'</span><strong>'+Number(v||0).toLocaleString()+'</strong></div>').join('')}
function summaryBoxes(){const s=APP.summary||{};return '<div class="card"><div class="section-title"><h3>'+esc(APP.sheet)+' Summary & Counts</h3></div><div class="summary-line"><div class="summary-box main"><h4>Partnames Counts</h4><div class="big-number">'+Number(s.partnames_count||0).toLocaleString()+'</div></div><div class="summary-box"><h4>PE Updates</h4>'+summaryRowsHtml(s.pe_counts)+'</div><div class="summary-box"><h4>Enrollment Status</h4>'+summaryRowsHtml(s.enrollment_counts)+'</div><div class="summary-box"><h4>Cloud Enrollment Remarks</h4>'+summaryRowsHtml(s.remarks_counts)+'</div><div class="summary-box"><h4>TRS Updates</h4>'+summaryRowsHtml(s.trs_counts)+'</div><div class="summary-box"><h4>Final Remarks / Status</h4>'+summaryRowsHtml(s.final_counts)+'</div></div></div>'}
function weekSortInfo(v){const s=String(v||'').trim();const n=s.toLowerCase();if(n.includes('pending'))return{g:0,num:0,label:n};const m=n.match(/wk\s*[-_]?\s*(\d+)/)||n.match(/week\s*[-_]?\s*(\d+)/);if(m)return{g:1,num:parseInt(m[1],10)||0,label:n};return{g:2,num:0,label:n}}function weekCompletionCompare(a,b){const A=weekSortInfo(a),B=weekSortInfo(b);if(A.g!==B.g)return A.g-B.g;if(A.g===1&&A.num!==B.num)return B.num-A.num;return A.label.localeCompare(B.label)}function selectedWeeks(){return Array.isArray(APP.weeks)?APP.weeks:[]}function weekBox(){const idx=APP.summary?.indexes?.weekIdx;const counts=APP.summary?.week_counts||{};if(idx==null||idx<0)return '<div class="card"><div class="muted">Week Completion column was not found in this sheet.</div></div>';const weeks=selectedWeeks();const entries=Object.entries(counts).sort((a,b)=>weekCompletionCompare(a[0],b[0]));const c=weeks.length?weeks.reduce((a,k)=>a+Number(counts[k]||0),0):Object.values(counts).reduce((a,b)=>a+Number(b||0),0);const label=weeks.length?(weeks.length===1?weeks[0]:weeks.length+' selected'):'All Week Completion';return '<div class="card"><div class="week-row"><div class="week-select-wrap"><label>Week Completion</label><button id="weekFilterBtn" class="filter-trigger '+(weeks.length?'active':'')+'" type="button" title="Filter Week Completion"><span>'+esc(label)+'</span><span>▾</span></button></div><div><label>Count</label><div class="week-count-box" title="Selected Week Completion count">'+Number(c).toLocaleString()+'</div></div></div></div>'}
function filteredRows(){let rows=[...APP.rows];const weeks=selectedWeeks();if(weeks.length){const idx=APP.summary?.indexes?.weekIdx;rows=rows.filter(r=>weeks.includes(rowCell(r,idx)))}if(APP.keyword)rows=rows.filter(r=>smartMatch(rowText(r),APP.keyword));Object.entries(APP.filterSearches).forEach(([i,q])=>{if(q)rows=rows.filter(r=>smartMatch(rowCell(r,Number(i)),q))});Object.entries(APP.filters).forEach(([i,vals])=>{if(vals&&vals.length)rows=rows.filter(r=>vals.some(v=>smartMatch(rowCell(r,Number(i)),v)||rowCell(r,Number(i))===v))});return rows}
function renderDashboard(){const lastText=formatSync(APP.lastSync.finished_at||APP.meta.updated_at);const tabs='<button class="tab '+(APP.sheet==='LTX'?'active':'')+'" data-tab="LTX">LTX</button><button class="tab '+(APP.sheet==='ETS'?'active':'')+'" data-tab="ETS">ETS</button>';let html='<div class="card topbar"><div><h2 style="margin:0 0 10px;">ETS / LTX SLIC Dashboard</h2><div class="tabs">'+tabs+'</div></div><div style="min-width:280px;"><div class="muted small">Last sync</div><strong>'+esc(lastText)+'</strong><div class="muted small" style="margin-top:5px;">Last status: '+esc(APP.lastSync.status||'No sync log yet')+'</div>'+(APP.canAdmin?adminPanel():'')+'</div></div>'+summaryBoxes()+weekBox();if(APP.canView)html+=tablePanel();document.getElementById('content').innerHTML=html;document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>loadSheet(b.dataset.tab));bindDashboard()}
function excelIcon(){return '<svg class="excel-svg" viewBox="0 0 24 24"><path d="M5 3h10l4 4v14H5V3zm9 1.5V8h3.5L14 4.5zM8 10l2.2 3L8 16h2.2l1.1-1.6 1.1 1.6h2.2l-2.2-3 2.2-3h-2.2l-1.1 1.6L10.2 10H8z" fill="currentColor"/></svg>'}function excelIconAll(){return '<span class="excel-all-wrap">'+excelIcon()+'<b>ALL</b></span>'}
function adminPanel(){return '<form id="browserSyncForm" class="toolbar" style="justify-content:flex-start;margin:10px 0 0;" onsubmit="return false;"><div><label>LTX Excel file</label><input id="ltxFile" type="file" accept=".xlsx,.xlsm,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel.sheet.macroEnabled.12" style="max-width:360px;"></div><div><label>ETS Excel file</label><input id="etsFile" type="file" accept=".xlsx,.xlsm,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel.sheet.macroEnabled.12" style="max-width:360px;"></div><button id="syncBtn" class="btn primary" type="button" title="Read the selected Excel file in your browser, then send small batches to Supabase.">Upload Excel & Sync</button><div id="syncStatus" class="muted small" style="min-width:260px;"></div></form><div class="toolbar" style="justify-content:flex-start;margin:10px 0 0;align-items:end;"><div style="min-width:110px;"><label>Auto Sync</label><select id="setEnabled"><option value="true">Enabled</option><option value="false">Disabled</option></select></div><div style="min-width:145px;"><label>Mode</label><select id="setType"><option value="daily">Specific time daily</option><option value="interval">Every N minutes</option></select></div><div style="min-width:110px;"><label>Daily time</label><input id="setDaily" type="time" value="00:00"></div><div style="min-width:110px;"><label>Minutes</label><input id="setInterval" type="number" min="5" max="1440" value="5"></div><div style="min-width:330px;"><label>LTX local path</label><input id="setLtx"></div><div style="min-width:330px;"><label>ETS local path</label><input id="setEts"></div><button id="saveSettings" class="btn yellow" type="button">Save Auto Sync Settings</button></div><div class="muted small" style="margin-top:8px;">Auto sync from local PC paths needs the included local PC sync agent running on the admin PC. Cloudflare cannot read local PC files by itself.</div>'}
function tablePanel(){const rows=filteredRows();return '<div class="card table-card"><div class="section-title"><h3>'+esc(APP.sheet)+' Updates</h3></div><div class="table-actions"><div><span class="badge">CIP View</span> <span class="muted small">Showing all <b id="showCount">'+rows.length.toLocaleString()+'</b> filtered rows. Stored rows: '+Number(APP.meta.row_count||0).toLocaleString()+'.</span></div><div class="navlinks"><button class="btn excel-btn" title="Export '+esc(APP.sheet)+' filtered rows to Excel" aria-label="Export '+esc(APP.sheet)+' filtered rows to Excel" onclick="exportXlsx(false)">'+excelIcon()+'</button><button class="btn excel-btn" title="Export all sheets to Excel" aria-label="Export all sheets to Excel" onclick="exportXlsx(true)">'+excelIconAll()+'</button></div></div><div class="table-actions"><div class="muted small" id="filterNote">No column filters selected</div><div class="filter-actions"><input class="keyword-input" id="globalSearch" value="'+esc(APP.keyword)+'" placeholder="Search all data e.g. LTC1715"><button class="btn yellow" id="searchBtn">Apply Filters</button><button class="btn ghost" id="clearBtn">Clear All Filters</button></div></div><div class="table-wrap" id="tableWrap"></div></div>'}
function bindDashboard(){const wb=document.getElementById('weekFilterBtn');if(wb)wb.onclick=e=>openWeekFilter(e);const gs=document.getElementById('globalSearch');if(gs)gs.onkeydown=e=>{if(e.key==='Enter'){APP.keyword=gs.value;renderDashboard()}};const sb=document.getElementById('searchBtn');if(sb)sb.onclick=()=>{APP.keyword=document.getElementById('globalSearch').value;renderDashboard()};const cb=document.getElementById('clearBtn');if(cb)cb.onclick=()=>{APP.keyword='';APP.filters={};APP.filterSearches={};APP.weeks=[];renderDashboard()};if(APP.canView)renderTable();if(APP.canAdmin){loadSettings();document.getElementById('saveSettings').onclick=saveSettings;document.getElementById('syncBtn').onclick=browserSync;}}
function renderTable(){const rows=filteredRows();const show=document.getElementById('showCount');if(show)show.textContent=rows.length.toLocaleString();const headers=APP.headers.length?APP.headers:Array.from({length:10},(_,i)=>'Column '+String.fromCharCode(65+i));const weeks=selectedWeeks();const optionRows=weeks.length?APP.rows.filter(r=>weeks.includes(rowCell(r,APP.summary?.indexes?.weekIdx))):APP.rows;let filterHead='<tr class="filter-head">',labelHead='<tr class="label-head">';headers.forEach((h,i)=>{const sel=APP.filters[i]||[];const typed=APP.filterSearches[i]||'';const active=(sel.length||typed)?'active':'';const label=sel.length?(sel.length+' selected'):(typed?'Search':'All');filterHead+='<th><div class="filter-cell"><button class="filter-trigger '+active+'" type="button" title="Filter '+esc(h)+'" onclick="openFilter(event,'+i+')"><span>'+esc(label)+'</span><span>▾</span></button></div></th>';labelHead+='<th>'+esc(h)+'</th>'});filterHead+='</tr>';labelHead+='</tr>';let body=rows.map(r=>'<tr>'+headers.map((_,i)=>'<td title="'+esc(rowCell(r,i))+'">'+esc(rowCell(r,i))+'</td>').join('')+'</tr>').join('')||'<tr><td colspan="'+headers.length+'" class="empty">No rows match the selected filters.</td></tr>';document.getElementById('tableWrap').innerHTML='<table><thead>'+filterHead+labelHead+'</thead><tbody>'+body+'</tbody></table>';const fc=Object.values(APP.filters).reduce((a,v)=>a+(v?v.length:0),0);const tc=Object.values(APP.filterSearches).filter(Boolean).length;const note=document.getElementById('filterNote');if(note)note.textContent=(fc||tc)?(fc+' selected value(s), '+tc+' typed column search(es)'):'No column filters selected';setupFloatingScroll()}
function openWeekFilter(ev){ev.preventDefault();ev.stopPropagation();const old=document.getElementById('filterMenu');if(old)old.remove();const counts=APP.summary?.week_counts||{};const values=Object.keys(counts).sort(weekCompletionCompare);const selected=new Set(selectedWeeks());const menu=document.createElement('div');menu.id='filterMenu';menu.className='filter-menu open';menu.innerHTML='<input type="text" id="weekValueSearch" placeholder="Search Week Completion..."><label class="choice-row" style="font-weight:900;"><input type="checkbox" id="selectAllWeeks"><span>Select all visible</span></label><div class="choice-list" id="weekList"></div><div class="menu-actions"><button class="btn yellow" id="wApply">Apply</button><button class="btn ghost" id="wClear">Clear</button></div>';document.body.appendChild(menu);const rect=ev.currentTarget.getBoundingClientRect();const menuW=280;const gap=6;let left=rect.left;let top=rect.bottom+gap;if(left+menuW>window.innerWidth-12)left=Math.max(12,window.innerWidth-menuW-12);if(top+420>window.innerHeight)top=Math.max(12,rect.top-420-gap);menu.style.left=left+'px';menu.style.top=top+'px';function fill(q=''){const list=menu.querySelector('#weekList');list.innerHTML=values.filter(v=>smartMatch(v,q)).map(v=>'<label class="choice-row"><input type="checkbox" value="'+esc(v)+'" '+(selected.has(v)?'checked':'')+'> <span title="'+esc(v)+'">'+esc(v)+'</span><small>'+Number(counts[v]||0).toLocaleString()+'</small></label>').join('')||'<div class="muted small" style="padding:8px;">No Week Completion values</div>'}fill('');menu.querySelector('#weekValueSearch').oninput=e=>fill(e.target.value);menu.querySelector('#selectAllWeeks').onchange=e=>{menu.querySelectorAll('#weekList input[type=checkbox]').forEach(x=>x.checked=e.target.checked)};menu.querySelector('#wApply').onclick=()=>{APP.weeks=[...menu.querySelectorAll('#weekList input:checked')].map(x=>x.value);menu.remove();renderDashboard()};menu.querySelector('#wClear').onclick=()=>{APP.weeks=[];menu.remove();renderDashboard()};setTimeout(()=>{function closer(e){if(!e.target.closest('#filterMenu')&&!e.target.closest('#weekFilterBtn')){menu.remove();document.removeEventListener('click',closer);window.removeEventListener('resize',closeNow)}}function closeNow(){menu.remove();document.removeEventListener('click',closer);window.removeEventListener('resize',closeNow)}document.addEventListener('click',closer);window.addEventListener('resize',closeNow)},0)}
function openFilter(ev,idx){ev.preventDefault();ev.stopPropagation();const old=document.getElementById('filterMenu');if(old)old.remove();const headers=APP.headers;const weeks=selectedWeeks();const optionRows=weeks.length?APP.rows.filter(r=>weeks.includes(rowCell(r,APP.summary?.indexes?.weekIdx))):APP.rows;const values=[...new Set(optionRows.map(r=>rowCell(r,idx)).filter(Boolean))].sort((a,b)=>a.localeCompare(b));const selected=new Set(APP.filters[idx]||[]);const typed=APP.filterSearches[idx]||'';const menu=document.createElement('div');menu.id='filterMenu';menu.className='filter-menu open';menu.innerHTML='<input type="text" id="filterValueSearch" value="'+esc(typed)+'" placeholder="Type to filter this column..."><label class="choice-row" style="font-weight:900;"><input type="checkbox" id="selectAllVisible"><span>Select all</span></label><div class="choice-list" id="filterList"></div><div class="menu-actions"><button class="btn yellow" id="fApply">Apply</button><button class="btn ghost" id="fClear">Clear</button></div>';document.body.appendChild(menu);const rect=ev.currentTarget.getBoundingClientRect();const menuW=260;const gap=6;let left=rect.left;let top=rect.bottom+gap;if(left+menuW>window.innerWidth-12)left=Math.max(12,window.innerWidth-menuW-12);if(top+420>window.innerHeight)top=Math.max(12,rect.top-420-gap);menu.style.left=left+'px';menu.style.top=top+'px';function fill(q=''){const list=menu.querySelector('#filterList');list.innerHTML=values.filter(v=>smartMatch(v,q)).map(v=>'<label class="choice-row" data-text="'+esc(v).toLowerCase()+'" data-norm="'+esc(searchNorm(v))+'"><input type="checkbox" value="'+esc(v)+'" '+(selected.has(v)?'checked':'')+'> <span title="'+esc(v)+'">'+esc(v)+'</span></label>').join('')||'<div class="muted small" style="padding:8px;">No nonblank values</div>'}fill(typed);menu.querySelector('#filterValueSearch').oninput=e=>fill(e.target.value);menu.querySelector('#selectAllVisible').onchange=e=>{menu.querySelectorAll('#filterList input[type=checkbox]').forEach(x=>x.checked=e.target.checked)};menu.querySelector('#fApply').onclick=()=>{APP.filterSearches[idx]=menu.querySelector('#filterValueSearch').value;APP.filters[idx]=[...menu.querySelectorAll('#filterList input:checked')].map(x=>x.value);menu.remove();renderDashboard()};menu.querySelector('#fClear').onclick=()=>{delete APP.filterSearches[idx];delete APP.filters[idx];menu.remove();renderDashboard()};setTimeout(()=>{function closer(e){if(!e.target.closest('#filterMenu')&&!e.target.closest('.filter-trigger')){menu.remove();document.removeEventListener('click',closer);window.removeEventListener('resize',closeNow);document.querySelector('.table-wrap')?.removeEventListener('scroll',closeNow)}}function closeNow(){menu.remove();document.removeEventListener('click',closer);window.removeEventListener('resize',closeNow);document.querySelector('.table-wrap')?.removeEventListener('scroll',closeNow)}document.addEventListener('click',closer);window.addEventListener('resize',closeNow);document.querySelector('.table-wrap')?.addEventListener('scroll',closeNow,{passive:true})},0)}
async function loadSettings(){try{const d=await api('/api/settings');const s=d.settings||{};APP.settings=s;document.getElementById('setEnabled').value=s.enabled?'true':'false';document.getElementById('setType').value=s.schedule_type||'interval';document.getElementById('setInterval').value=s.interval_minutes||5;document.getElementById('setDaily').value=s.daily_time||'00:00';document.getElementById('setLtx').value=s.ltx_path||'';document.getElementById('setEts').value=s.ets_path||''}catch(e){console.warn(e)}}
async function saveSettings(){showLoad();try{await api('/api/settings',{method:'POST',body:JSON.stringify({enabled:document.getElementById('setEnabled').value==='true',schedule_type:document.getElementById('setType').value,interval_minutes:document.getElementById('setInterval').value,daily_time:document.getElementById('setDaily').value,ltx_path:document.getElementById('setLtx').value,ets_path:document.getElementById('setEts').value})});alert('Auto sync settings saved. The local_sync_agent.py must be running on your PC.')}catch(e){alert(e.message)}finally{hideLoad()}}
function slicCell(v){if(v==null)return '';if(v instanceof Date)return v.toISOString().slice(0,19).replace('T',' ');return String(v).trim()}function displayHeader(col,raw){const f={1:'Partname',13:'Enrollment Status',14:'Cloud Enrollment Remarks',15:'TRS Updates',16:'PE Updates',18:'Final Remarks / Status',19:'Week Completion'};return f[col]||normText(raw)||('Column '+String.fromCharCode(64+col))}function uniqueHeaders(h){const seen={};return h.map((x,i)=>{let b=x||('Column '+String.fromCharCode(65+i));if(seen[b]){seen[b]++;return b+' ('+seen[b]+')'}seen[b]=1;return b})}
async function parseExcel(sheetKey,file){if(!window.XLSX)throw new Error('Excel parser CDN is blocked.');const cfg=SYNC_CFG[sheetKey];const buf=await file.arrayBuffer();const wb=XLSX.read(buf,{type:'array',cellDates:true});if(!wb.SheetNames.includes(cfg.sheetName))throw new Error('Sheet not found for '+sheetKey+': '+cfg.sheetName);const aoa=XLSX.utils.sheet_to_json(wb.Sheets[cfg.sheetName],{header:1,raw:false,defval:'',blankrows:false});const headers=uniqueHeaders(cfg.columns.map(c=>displayHeader(c,slicCell((aoa[cfg.headerRow-1]||[])[c-1]))));const rows=[];for(let r=cfg.dataStartRow-1;r<aoa.length;r++){const vals=cfg.columns.map(c=>slicCell((aoa[r]||[])[c-1]));if(vals.every(x=>!normText(x)))continue;rows.push({source_row:r+1,row_values:vals})}return {sheet_key:sheetKey,sheet_name:cfg.sheetName,headers,rows,row_count:rows.length}}
async function browserSync(){const ltx=document.getElementById('ltxFile').files[0],ets=document.getElementById('etsFile').files[0];const jobs=[];if(ltx)jobs.push(['LTX',ltx]);if(ets)jobs.push(['ETS',ets]);if(!jobs.length){alert('Choose at least one LTX or ETS Excel file.');return}if(!confirm('Upload selected Excel file(s) and sync now?'))return;showLoad();const st=document.getElementById('syncStatus');try{const start=await api('/api/sync/start',{method:'POST',body:'{}'});const syncId=start.sync_id;const metas=[];for(const [sheetKey,file] of jobs){st.textContent='Reading '+sheetKey+' Excel...';const parsed=await parseExcel(sheetKey,file);metas.push({sheet_key:sheetKey,sheet_name:parsed.sheet_name,headers:parsed.headers,row_count:parsed.row_count});for(let i=0;i<parsed.rows.length;i+=250){st.textContent='Syncing '+sheetKey+' rows '+(i+1)+'-'+Math.min(i+250,parsed.rows.length)+' of '+parsed.rows.length.toLocaleString();await api('/api/sync/chunk',{method:'POST',body:JSON.stringify({sync_id:syncId,sheet_key:sheetKey,sheet_name:parsed.sheet_name,headers:parsed.headers,rows:parsed.rows.slice(i,i+250)})});}}st.textContent='Finalizing sync...';await api('/api/sync/finish',{method:'POST',body:JSON.stringify({sync_id:syncId,sheets:metas,started_at:start.started_at})});st.textContent='Sync completed.';await loadSheet(APP.sheet)}catch(e){alert(e.message);st.textContent='Sync failed: '+e.message}finally{hideLoad()}}
async function exportXlsx(allSheets){showLoad();try{const headers=APP.headers.length?APP.headers:Array.from({length:10},(_,i)=>'Column '+String.fromCharCode(65+i));if(!window.XLSX)throw new Error('Excel parser/export library is not loaded.');const wb=XLSX.utils.book_new();if(allSheets){for(const sheetKey of ['LTX','ETS']){let d;if(sheetKey===APP.sheet)d={rows:APP.rows,headers:APP.headers};else{d=await api('/api/data?sheet='+sheetKey);d={rows:d.rows||[],headers:(d.meta&&d.meta.headers)||[]}}const hs=(d.headers&&d.headers.length)?d.headers:headers;const aoa=[hs,...(d.rows||[]).map(r=>hs.map((_,i)=>rowCell(r,i)))];XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(aoa),sheetKey)}}else{const rows=filteredRows();const aoa=[headers,...rows.map(r=>headers.map((_,i)=>rowCell(r,i)))];XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(aoa),APP.sheet)}XLSX.writeFile(wb,'SLIC_DashBoards_'+(allSheets?'ALL':APP.sheet)+'_'+new Date().toISOString().slice(0,19).replace(/[-:T]/g,'')+'.xlsx')}catch(e){alert(e.message||e)}finally{hideLoad()}}
function setupFloatingScroll(){document.querySelectorAll('.table-wrap').forEach(function(w){if(w.dataset.floatReady)return;w.dataset.floatReady='1';var f=document.createElement('div');f.className='floating-x-scroll';var inner=document.createElement('div');inner.className='floating-x-scroll-inner';f.appendChild(inner);document.body.appendChild(f);function syncSize(){var t=w.querySelector('table');if(!t)return;inner.style.width=t.scrollWidth+'px';f.scrollLeft=w.scrollLeft;var r=w.getBoundingClientRect();f.style.width=Math.max(280,Math.min(r.width,window.innerWidth-24))+'px';var needs=t.scrollWidth>w.clientWidth+8;var tableVisible=r.top<window.innerHeight-70&&r.bottom>window.innerHeight-28;var atBottom=r.bottom<=window.innerHeight-28;f.classList.toggle('show',needs&&tableVisible&&!atBottom)}w.addEventListener('scroll',function(){f.scrollLeft=w.scrollLeft;syncSize()});f.addEventListener('scroll',function(){w.scrollLeft=f.scrollLeft});window.addEventListener('scroll',syncSize,{passive:true});window.addEventListener('resize',syncSize);setTimeout(syncSize,150);setTimeout(syncSize,800)})}
window.addEventListener('load',hideLoad);window.addEventListener('load',setupFloatingScroll);window.addEventListener('resize',setupFloatingScroll);
